name: Agent Quality Gate

on:
  push:
    paths:
      - '.web-agency/skills/**/agents/**/*.md'
  pull_request:
    paths:
      - '.web-agency/skills/**/agents/**/*.md'
  workflow_dispatch:

jobs:
  validate-agents:
    runs-on: ubuntu-latest
    name: Validate Agent Quality

    steps:
      - uses: actions/checkout@v4

      - name: Get changed agent files
        id: changed
        uses: step-security/changed-files@v45
        with:
          files: |
            .web-agency/skills/**/agents/**/*.md

      - name: Validate frontmatter
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          ERRORS=0

          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            echo "📄 Validating: $file"

            # Check file exists and is not empty
            if [ ! -s "$file" ]; then
              echo "❌ ERROR: $file is empty"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Check YAML frontmatter exists
            if ! head -1 "$file" | grep -q '^---$'; then
              echo "❌ ERROR: $file missing YAML frontmatter (no opening ---)"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Check closing frontmatter delimiter
            if ! sed -n '2,$ p' "$file" | grep -q '^---$'; then
              echo "❌ ERROR: $file missing closing --- delimiter"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Extract frontmatter (between first and second ---)
            FRONTMATTER=$(sed -n '2,/^---$/p' "$file" | head -n -1)

            FILE_ERRORS=0

            # Check required fields: name
            if ! echo "$FRONTMATTER" | grep -q '^name:'; then
              echo "❌ ERROR: $file missing 'name' in frontmatter"
              ERRORS=$((ERRORS + 1))
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            # Check required fields: description
            if ! echo "$FRONTMATTER" | grep -q '^description:'; then
              echo "❌ ERROR: $file missing 'description' in frontmatter"
              ERRORS=$((ERRORS + 1))
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            # Check required fields: workflows
            if ! echo "$FRONTMATTER" | grep -q '^workflows:'; then
              echo "❌ ERROR: $file missing 'workflows' in frontmatter"
              ERRORS=$((ERRORS + 1))
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            if [ "$FILE_ERRORS" -eq 0 ]; then
              echo "  ✅ Frontmatter OK"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS frontmatter error(s) found"
            exit 1
          fi

          echo ""
          echo "✅ All frontmatter validations passed"

      - name: Validate minimum content
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          WARNINGS=0
          ERRORS=0

          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            echo "📄 Checking content: $file"
            LINES=$(wc -l < "$file")
            FILENAME=$(basename "$file")

            # Skip orchestrator files (shorter by design)
            if [ "$FILENAME" = "orchestrator.md" ]; then
              echo "  ⏭️ Skipping orchestrator (shorter by design)"
              continue
            fi

            # Minimum 80 lines for non-orchestrator agents
            if [ "$LINES" -lt 80 ]; then
              echo "❌ ERROR: $file has only $LINES lines (minimum: 80)"
              ERRORS=$((ERRORS + 1))
            fi

            # Check required sections
            if ! grep -q '## Ta Responsabilité Unique' "$file"; then
              echo "⚠️ WARNING: $file missing 'Ta Responsabilité Unique' section"
              WARNINGS=$((WARNINGS + 1))
            fi

            if ! grep -q '## Tu NE fais PAS' "$file"; then
              echo "⚠️ WARNING: $file missing 'Tu NE fais PAS' section"
              WARNINGS=$((WARNINGS + 1))
            fi

            if ! grep -q '## Input Attendu' "$file"; then
              echo "⚠️ WARNING: $file missing 'Input Attendu' section"
              WARNINGS=$((WARNINGS + 1))
            fi

            if ! grep -q '## Output Produit' "$file"; then
              echo "⚠️ WARNING: $file missing 'Output Produit' section"
              WARNINGS=$((WARNINGS + 1))
            fi

            if ! grep -q '## Escalades' "$file"; then
              echo "⚠️ WARNING: $file missing 'Escalades' section"
              WARNINGS=$((WARNINGS + 1))
            fi

            if ! grep -q '## Livrables' "$file"; then
              echo "⚠️ WARNING: $file missing 'Livrables' section"
              WARNINGS=$((WARNINGS + 1))
            fi

            echo "  ✅ Content check done ($LINES lines)"
          done

          echo ""
          echo "📊 Results: $ERRORS error(s), $WARNINGS warning(s)"

          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi

      - name: Check for duplicate agent names
        run: |
          echo "🔍 Checking for duplicate agent names..."

          # Extract all agent names from frontmatter
          NAMES=$(find .web-agency/skills -path '*/agents/*.md' -exec \
            sed -n '/^---$/,/^---$/{ /^name:/p }' {} \; | \
            sed 's/^name: *//' | sort)

          DUPES=$(echo "$NAMES" | uniq -d)

          if [ -n "$DUPES" ]; then
            echo "❌ Duplicate agent names found:"
            echo "$DUPES"
            echo ""
            echo "Each agent must have a unique name across all skills."
            exit 1
          fi

          TOTAL=$(echo "$NAMES" | wc -l)
          echo "✅ All $TOTAL agent names are unique"
